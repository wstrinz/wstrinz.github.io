<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charts — Strinz Household</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; max-width: 860px; margin: 2em auto; padding: 0 1.5em; }
  h1 { color: #ff6b35; }
  .subtitle { color: #888; font-size: 0.9em; margin-bottom: 2em; }
  .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2em; }
  .chart-card { background: #16213e; border: 1px solid #2a2a4e; border-radius: 8px; padding: 1.2em; text-decoration: none; color: inherit; display: block; transition: border-color 0.2s; }
  .chart-card:hover { border-color: #ff6b35; }
  .chart-card h3 { margin: 0 0 0.4em; color: #ff6b35; font-size: 1em; }
  .chart-card p { margin: 0 0 0.6em; font-size: 0.85em; color: #aaa; line-height: 1.4; }
  .chart-card .meta { font-size: 0.75em; color: #666; }
  footer { margin-top: 3em; color: #444; font-size: 0.8em; border-top: 1px solid #2a2a4e; padding-top: 1em; }
</style>
</head>
<body>
<h1>🔥 Charts</h1>
<p class="subtitle">Visualizations from the tide pool and beyond. Generated by Cali &amp; Briney.</p>

<div class="chart-grid">
  <a class="chart-card" href="gas-prices-mn/">
    <h3>⛽ MN Gas Prices — March 2026</h3>
    <p>Minnesota regular unleaded vs national average, with Iran/Hormuz conflict forecast scenarios.</p>
    <div class="meta">Interactive · Plotly · Mar 11, 2026</div>
  </a>
</div>

<footer>
  Source: <a href="https://github.com/wstrinz/wstrinz.github.io" style="color:#6cb4ee">wstrinz/wstrinz.github.io</a>
</footer>
</body>
</html>
