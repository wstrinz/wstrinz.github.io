<script>
(async () => {
  const status = document.getElementById('status');
  const spinner = document.getElementById('spinner');

  function fail(msg) {
    spinner.style.display = 'none';
    status.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'error';
    el.innerHTML = msg || '🔥🦀<br><br>This fire is tended elsewhere.';
    document.getElementById('loader').appendChild(el);
  }

  // Fail closed if Web Crypto unavailable (e.g. non-secure context, old browser)
  if (!window.crypto || !window.crypto.subtle) return fail('This browser does not support secure decryption.');

  try {
    const hash = window.location.hash.slice(1);
    if (!hash) return fail();

    // Size guard: AES-256 key is exactly 32 bytes = 43 base64url chars (no padding)
    // Reject anything wildly outside that range before decoding
    if (hash.length < 40 || hash.length > 60) return fail();

    // base64url decode (for key from URL fragment — uses - and _ instead of + and /)
    const b64urlDecode = (s) => {
      const b64 = s.replace(/-/g, '+').replace(/_/g, '/');
      const pad = (4 - b64.length % 4) % 4;
      return Uint8Array.from(atob(b64 + '='.repeat(pad)), c => c.charCodeAt(0));
    };

    // standard base64 decode (for payload and IV embedded in the page)
    const b64Decode = (s) => {
      return Uint8Array.from(atob(s), c => c.charCodeAt(0));
    };

    const keyBytes = b64urlDecode(hash);
    if (keyBytes.length !== 32) return fail();

    const ivB64 = 'NTLiQfZqwgN0O2Rj';
    const iv = b64Decode(ivB64);

    const payloadB64 = document.getElementById('encrypted-payload').textContent.trim();
    const ciphertext = b64Decode(payloadB64);

    const key = await crypto.subtle.importKey(
      'raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']
    );

    const plainBuf = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv }, key, ciphertext
    );

    const html = new TextDecoder().decode(plainBuf);

    // Method: replace entire document via Blob URL navigation
    // This is the most reliable cross-browser way to fully replace
    // the page with a new HTML document, including all styles/scripts.
    const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);
    window.location.replace(blobUrl);
  } catch (e) {
    fail();
  }
})();
</script>
